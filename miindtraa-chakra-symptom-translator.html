.nav{display:flex;overflow-x:auto;gap:0;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;-webkit-overflow-scrolling:touch}

.chakra-panel{display:none}.chakra-panel.active{display:block}

.chakra-title{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ct-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.ct-name{font-size:22px;font-weight:800}
.ct-meta{font-size:13px;color:var(--grey)}

.section{background:var(--white);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.04);border:1px solid var(--border)}
.sec-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer}

.nqh-section .sec-title{color:var(--purple)}

.cta-bar{background:linear-gradient(135deg,var(--purple),var(--dark));border-radius:16px;padding:24px;text-align:center;margin-top:20px}
.cta-bar h3{color:#fff;font-size:18px;font-weight:700;margin-bottom:6px}
.cta-bar p{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:14px;line-height:1.5}
.cta-btn{display:inline-block;background:var(--orange);color:#fff;border:none;border-radius:50px;padding:14px 32px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:none;box-shadow:0 4px 20px rgba(230,126,34,.3)}
.cta-btn:hover{transform:translateY(-2px)}

.footer{text-align:center;padding:20px;font-size:11px;color:rgba(0,0,0,.3);line-height:1.7}

@media(max-width:480px){.htitle{font-size:22px}.nav-btn{padding:10px 6px}.nav-icon{font-size:16px}.nav-name{font-size:9px}}

let active=0;

function buildNav(){
  const nav=document.getElementById('nav');
  chakras.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='nav-btn'+(i===0?' active':'');
    btn.style.setProperty('--active-color',c.clr);
    btn.innerHTML=`<span class="nav-icon">${c.icon}</span><span class="nav-name">${c.nm}</span>`;
    btn.onclick=()=>switchTo(i);
    nav.appendChild(btn);
  });
}

function switchTo(i){
  active=i;
  document.querySelectorAll('.nav-btn').forEach((b,j)=>{
    b.classList.toggle('active',j===i);
    b.style.setProperty('--active-color',chakras[j].clr);
  });
  renderPanel();
}

function tags(arr){return arr.map(a=>`<span class="tag">${a}</span>`).join(' ')}
function list(arr){return arr.map(a=>`<div style="margin-bottom:4px">\u2022 ${a}</div>`).join('')}

  const c=chakras[active];
  const el=document.getElementById('content');
  el.innerHTML=`
